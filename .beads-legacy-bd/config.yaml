# Beads configuration for ogent.
#
# Current storage is Dolt-backed. The database directory and runtime locks are
# local artifacts ignored by .beads/.gitignore; tracked files here document the
# repo-wide defaults agents should share.

# Git worktrees are common in this repo. Direct access avoids daemon writes from
# landing on the wrong branch.
no-daemon: true

# Required by current bd doctor for multi-clone hygiene. Dolt remains the active
# backend; `bd sync` is a compatibility no-op in this configuration.
sync-branch: "beads-sync"
