# Ogent CI - run the ERT suite across supported Emacs versions.

name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs_version:
          - 29.1
          - snapshot
    steps:
      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - uses: actions/checkout@v4

      - name: Test
        run: |
          # setup-emacs/Nix needs site startup for compressed core Lisp.
          emacs --batch \
            -L lisp -L lisp/ui -L test -L test/ui \
            -l test/ogent-test-helper.el \
            --eval '(progn
                      (dolist (file (ogent-test--files))
                        (load-file file))
                      (ert-run-tests-batch-and-exit))'
