# Ogent CI - run the ERT suite across supported Emacs versions.

name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    # The bleeding-edge `snapshot' Emacs is a moving target whose binary is
    # fetched via purcell/setup-emacs through the GitHub API, which regularly
    # throttles the download with transient HTTP 429 "secondary rate limit"
    # errors. Keep snapshot in the matrix for early-warning signal, but do not
    # let its flaky toolchain setup gate the build; the stable releases
    # (29.1, 30.2) remain required.
    continue-on-error: ${{ matrix.emacs_version == 'snapshot' }}
    strategy:
      fail-fast: false
      matrix:
        emacs_version:
          - 29.1
          - 30.2
          - snapshot
    steps:
      - uses: purcell/setup-emacs@v8.0
        with:
          version: ${{ matrix.emacs_version }}

      - uses: actions/checkout@v6

      - name: Test
        run: |
          # Nix stores jka-compr itself as .el.gz, which can recurse while
          # bootstrapping compressed core Lisp. Preload an uncompressed copy.
          compat_dir="$RUNNER_TEMP/emacs-lisp-compat"
          mkdir -p "$compat_dir"
          lisp_dir="$(emacs --batch --eval '(princ lisp-directory)')"
          if [ -f "$lisp_dir/jka-compr.el.gz" ]; then
            gzip -dc "$lisp_dir/jka-compr.el.gz" > "$compat_dir/jka-compr.el"
          elif [ -f "$lisp_dir/jka-compr.el" ]; then
            cp "$lisp_dir/jka-compr.el" "$compat_dir/jka-compr.el"
          fi

          emacs --batch \
            -L "$compat_dir" \
            -l jka-compr \
            -L lisp -L lisp/ui -L test -L test/ui \
            -l test/ogent-test-helper.el \
            --eval '(progn
                      (dolist (file (ogent-test--files))
                        (load-file file))
                      (ert-run-tests-batch-and-exit))'

      # Store-integrity hash audit (ogent-aq8.4): hash every real-store
      # path, re-run the suite bracketed by the hashes, and fail on any
      # drift.  Belt to the test-helper tripwire's suspenders - catches
      # write channels the in-Lisp chokepoints miss.
      - name: Store integrity
        run: make test-isolation

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: purcell/setup-emacs@v8.0
        with:
          version: 30.2

      - name: Lint
        run: make sandbox-lint
