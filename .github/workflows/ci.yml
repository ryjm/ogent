# Ogent CI - run the ERT suite across supported Emacs versions.

name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs_version:
          - 29.1
          - snapshot
    steps:
      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - uses: actions/checkout@v4

      - name: Test
        run: |
          # Nix stores jka-compr itself as .el.gz, which can recurse while
          # bootstrapping compressed core Lisp. Preload an uncompressed copy.
          compat_dir="$RUNNER_TEMP/emacs-lisp-compat"
          mkdir -p "$compat_dir"
          lisp_dir="$(emacs --batch --eval '(princ lisp-directory)')"
          if [ -f "$lisp_dir/jka-compr.el.gz" ]; then
            gzip -dc "$lisp_dir/jka-compr.el.gz" > "$compat_dir/jka-compr.el"
          elif [ -f "$lisp_dir/jka-compr.el" ]; then
            cp "$lisp_dir/jka-compr.el" "$compat_dir/jka-compr.el"
          fi

          emacs --batch \
            -L "$compat_dir" \
            -l jka-compr \
            -L lisp -L lisp/ui -L test -L test/ui \
            -l test/ogent-test-helper.el \
            --eval '(progn
                      (dolist (file (ogent-test--files))
                        (load-file file))
                      (ert-run-tests-batch-and-exit))'
